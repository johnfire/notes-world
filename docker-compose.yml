services:
  app:
    build:
      context: .
      target: production
    environment:
      - NODE_ENV=production
      - PORT=3001
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=notes_world
      - POSTGRES_USER=notes_world
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=https://${NGINX_HOST}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - LOG_DIR=/logs
    volumes:
      - ${NOTES_WORLD_LOG_PATH:-./logs}:/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build:
      context: .
      target: mcp
    environment:
      - NOTES_WORLD_API_URL=http://app:3001
      - NOTES_WORLD_API_KEY=${NOTES_WORLD_API_KEY}
      - MCP_BASE_URL=https://${NGINX_HOST}
      - MCP_OAUTH_CLIENT_ID=notes-world-mcp
      - MCP_JWT_SECRET=${MCP_JWT_SECRET}
      - MCP_PORT=3002
      - MCP_STORE_PATH=/data/oauth-store.json
    volumes:
      - mcp_oauth_store:/data
    depends_on:
      - app
    restart: unless-stopped

  mail-mcp:
    build:
      context: .
      target: mail-mcp
    environment:
      - MAIL_MCP_PORT=3003
      - MAIL_MCP_BASE_URL=https://mcp.mail.christopherrehm.de
      - MAIL_MCP_OAUTH_CLIENT_ID=mail-mcp
      - MAIL_MCP_API_KEY=${MAIL_MCP_API_KEY}
      - MAIL_MCP_JWT_SECRET=${MAIL_MCP_JWT_SECRET}
      - MAIL_MCP_STORE_PATH=/data/oauth-store.json
      - IMAP_HOST=mail.christopherrehm.de
      - IMAP_PORT=993
      - IMAP_LOGIN=contact@christopherrehm.de*mcp-mail
      - IMAP_PASSWORD=${IMAP_PASSWORD}
      - MAILBOX_ADDRESS=contact@christopherrehm.de
      - MAIL_MCP_ALLOWED_FROM=contact@christopherrehm.de,christopher@leguilde.art,contact@leguilde.art,contact@tandkcybernetics.net
    ports:
      - "127.0.0.1:8092:3003"
    extra_hosts:
      # Reach the host's Dovecot by hostname (so TLS validates) via the docker
      # bridge gateway, instead of hairpinning out through the public IP.
      - "mail.christopherrehm.de:host-gateway"
    volumes:
      - mail_mcp_oauth_store:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./packages/web/dist:/var/www/notes-world:ro
      - ./nginx/downloads:/var/www/notes-world/downloads:ro
    environment:
      - NGINX_HOST=${NGINX_HOST}
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=notes_world
      - POSTGRES_USER=notes_world
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes_world"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=notes_world
      - POSTGRES_USER=notes_world
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_EXTRA_OPTS=--clean --if-exists
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=3
      - TZ=${TZ:-UTC}
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  mcp_oauth_store:
  mail_mcp_oauth_store:
