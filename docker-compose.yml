services:
  app:
    build: .
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=notes_world
      - POSTGRES_USER=notes_world
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PHASE1_USER_ID=${PHASE1_USER_ID:-00000000-0000-0000-0000-000000000001}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=notes_world
      - POSTGRES_USER=notes_world
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes_world"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  db-backup:
    image: postgres:16-alpine
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "while true; do
        pg_dump -h db -U notes_world notes_world > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql
        echo 'Backup completed at' $$(date)
        sleep 86400
      done"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
