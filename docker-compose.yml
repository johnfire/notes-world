services:
  app:
    build:
      context: .
      target: production
    environment:
      - NODE_ENV=production
      - PORT=3001
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=notes_world
      - POSTGRES_USER=notes_world
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=https://${NGINX_HOST}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build:
      context: .
      target: mcp
    environment:
      - NOTES_WORLD_API_URL=http://app:3001
      - NOTES_WORLD_API_KEY=${NOTES_WORLD_API_KEY}
      - MCP_API_KEY=${MCP_API_KEY}
      - MCP_PORT=3002
    depends_on:
      - app
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8082:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./packages/web/dist:/var/www/notes-world:ro
      - ./nginx/downloads:/var/www/notes-world/downloads:ro
    environment:
      - NGINX_HOST=${NGINX_HOST}
    depends_on:
      - app
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=notes_world
      - POSTGRES_USER=notes_world
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes_world"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  db-backup:
    image: prodrigestivill/postgres-backup-local:16-alpine
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=notes_world
      - POSTGRES_USER=notes_world
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_EXTRA_OPTS=--clean --if-exists
      - SCHEDULE=@daily
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=3
      - TZ=${TZ:-UTC}
    volumes:
      - ./backups:/backups
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
