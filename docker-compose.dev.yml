# Local development stack — Nginx serves built SPA, Express serves API
# Run: npm run build -w packages/web && docker compose -f docker-compose.dev.yml up

services:
  app:
    build:
      context: .
      target: production
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=notes_world
      - POSTGRES_USER=notes_world
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devpassword}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=http://localhost
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./packages/web/dist:/var/www/notes-world:ro
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=notes_world
      - POSTGRES_USER=notes_world
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notes_world"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
