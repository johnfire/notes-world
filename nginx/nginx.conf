server {
    listen 80;
    server_name ${NGINX_HOST};

    root /var/www/notes-world;
    index index.html;

    # API proxied to Express
    location /api/ {
        proxy_pass         http://app:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://app:3001;
    }

    # MCP HTTP server (streamable HTTP transport)
    location /mcp {
        proxy_pass         http://mcp:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        '';
        chunked_transfer_encoding on;
    }

    # OAuth 2.1 endpoints (MCP server)
    location /oauth/ {
        proxy_pass         http://mcp:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /.well-known/ {
        proxy_pass         http://mcp:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # APK downloads — serve with correct MIME type, no SPA fallback
    location /downloads/ {
        add_header Content-Disposition 'attachment';
        types { application/vnd.android.package-archive apk; }
        default_type application/octet-stream;
    }

    # SPA — all paths fall back to index.html (React Router handles routing)
    location / {
        # Security headers for the document that runs the app JS (helmet only
        # covers /api responses, which are proxied to Express above).
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # CSP matched to the actual Vite build: same-origin JS/CSS (no inline
        # scripts), Google Fonts for styles/fonts, same-origin API via fetch.
        # Umami analytics (stats.christopherrehm.de) is allowed to load its
        # script and send events.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://stats.christopherrehm.de; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:; connect-src 'self' https://stats.christopherrehm.de; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

        try_files $uri $uri/ /index.html;
    }
}
